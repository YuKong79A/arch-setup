"$schema" = 'https://starship.rs/config-schema.json'

# end4 layout, Noctalia v5 palette
add_newline = true
format = """
$cmd_duration $directory$git_branch
  $character"""
palette = 'colors'

[palettes.colors]
color_accent = '#f5bd59'
color_accent_fg = '#422c00'
color_text = '#ebe1d5'
color_muted = '#9c8f7d'
color_surface = '#2e2922'
color_surface_alt = '#5a4621'
color_directory = '#bcd070'
color_git = '#d1b486'
color_git_fg = '#422c00'
color_success = '#e0c293'
color_error = '#f5bd59'

[fill]
symbol = '-'
style = 'fg:color_muted'

[character]
success_symbol = "[о©ұ пҒӢ](bold fg:color_success)"
error_symbol = "[пҖҚ пҒӢ](bold fg:color_error)"

[package]
disabled = true

[git_branch]
style = "bg:color_git"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold fg:color_git)[$symbol $branch(:$remote_branch)](fg:color_git_fg bg:color_git)[оӮҙ ](bold fg:color_git)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format = "[вҖў$hostname](bg:color_git bold fg:color_git_fg)[оӮҙ](bold fg:color_git)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:color_git fg:color_git_fg"
style_root = "red bold"
format = "[оӮ¶](bold fg:color_git)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:color_directory fg:color_accent_fg"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:color_directory)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:color_directory)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:color_accent)[у°Әў $duration](bold bg:color_accent fg:color_accent_fg)[оӮҙ](bold fg:color_accent)'
