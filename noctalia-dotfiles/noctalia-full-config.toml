    wallpaper_placement = "attached"

    [shell.screen_corners]
    enabled = false
    size = 32

    [shell.screenshot]
    copy_to_clipboard = true
    directory = "/home/yukong/Pictures/screenshots"
    filename_pattern = ""
    freeze_screen = true
    pipe_command = ""
    pipe_to_command = false
    save_to_file = true

    [shell.session.power]

    [[shell.session.actions]]
    action = "lock"
    command = ""
    enabled = true
    glyph = ""
    label = ""
    shortcut = ""
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    command = ""
    enabled = true
