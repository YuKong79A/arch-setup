[theme]
builtin = "Noctalia"
community_palette = "Oxocarbon"
custom_palette = ""
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "btop", "cava", "gtk3", "gtk4", "kcolorscheme", "kitty", "niri", "qt" ]
    community_ids = [
        "starship-custom",
        "fastfetch",
        "yazi",
        "fcitx5-ori",
        "papirus-noctalia-auto",
        "spicetify",
        "zen-browser",
        "steam",
        "lazyvim",
        "fuzzel"
    ]
    enable_builtin_templates = true
    enable_community_templates = true

[wallpaper]
