[audio]
enable_overdrive = false
enable_sounds = true
notification_sound = "/usr/share/noctalia/assets/sounds/notification.wav"
sound_volume = 1.0
volume_change_sound = "/usr/share/noctalia/assets/sounds/volume-change.wav"

[backdrop]
blur_intensity = 1.0
enabled = true
tint_intensity = 0.30000001192092896

[bar]
order = [ "default" ]

    [bar.default]
    auto_hide = false
    background_opacity = 1.0
    border = "outline"
    border_width = 0.0
    capsule = true
    capsule_fill = "surface_variant"
    capsule_opacity = 1.0
    capsule_padding = 6.0
    capsule_thickness = 0.75999999046325684
    center = [ "cat", "group:g1" ]
    color = "primary"
    contact_shadow = false
    enabled = true
    end = [ "tray", "notifications", "theme_mode", "clipboard", "volume", "battery", "control-center", "session" ]
    font_weight = 500
    icon_color = "primary"
    layer = "top"
    margin_edge = 10
    margin_ends = 180
    padding = 14
    panel_overlap = 1
    position = "top"
    radius = 12
    radius_bottom_left = 12
    radius_bottom_right = 12
    radius_top_left = 12
    radius_top_right = 12
    reserve_space = true
    scale = 1.0
    shadow = true
    start = [ "launcher", "workspaces", "active_window", "group:g2" ]
    thickness = 34
    widget_spacing = 6

        [[bar.default.capsule_group]]
        fill = "surface_variant"
        id = "g1"
        members = [ "clock", "date" ]
        opacity = 1.0
        padding = 6.0

        [[bar.default.capsule_group]]
        fill = "surface_variant"
        id = "g2"
        members = [ "media", "audio_visualizer" ]
        opacity = 1.0
        padding = 6.0

[battery]
warning_threshold = 20

[brightness]
enable_ddcutil = false
ignore_mmids = []
minimum_brightness = 0.0

[calendar]
enabled = true
refresh_minutes = 15

[control_center]
sidebar = "compact"
sidebar_section = "compact"

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "nightlight"

    [[control_center.shortcuts]]
    type = "notification"

    [[control_center.shortcuts]]
    type = "power_profile"

[desktop_widgets]
enabled = false
schema_version = 2
widget_order = [ "desktop-widget-0000000000000001", "desktop-widget-0000000000000002" ]

    [desktop_widgets.grid]
    cell_size = 8
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    box_height = 232.0
    box_width = 288.0
    cx = 1864.0
    cy = 228.0
    enabled = true
    output = "eDP-1"
    rotation = 0.0
    type = "fancy_audio_visualizer"

        [desktop_widgets.widget.desktop-widget-0000000000000001.settings]
        background = false
        background_color = "surface"
        background_opacity = 0.80000000000000004
        background_padding = 10.0
        background_radius = 12.0
        bar_width = 0.59999999999999998
        bloom_intensity = 0.5
        fade_when_idle = true
        inner_diameter = 0.69999999999999996
        primary_color = "primary"
        ring_opacity = 0.80000000000000004
        rotation_speed = 0.5
        secondary_color = "secondary"
        sensitivity = 1.5
        visualization_mode = "bars_rings"
        wave_thickness = 1.0

    [desktop_widgets.widget.desktop-widget-0000000000000002]
    box_height = 152.0
    box_width = 384.0
    cx = 1848.0
    cy = 1064.0
    enabled = true
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

        [desktop_widgets.widget.desktop-widget-0000000000000002.settings]
        background = true
        background_color = "surface"
        background_opacity = 0.80000000000000004
        background_padding = 10.0
        background_radius = 12.0
        circle = true
        clock_style = "digital"
        color = "primary"
        font_family = ""
        format = "{:%H:%M}"
        shadow = true

[dock]
active_monitor_only = false
active_opacity = 1.0
active_scale = 1.0
auto_hide = false
background_opacity = 0.87999999523162842
cross_axis_padding = 8
enabled = false
icon_size = 48
inactive_opacity = 0.85000002384185791
inactive_scale = 0.85000002384185791
item_spacing = 6
launcher_icon = "grid-dots"
launcher_position = "none"
magnification = true
magnification_scale = 1.4500000476837158
main_axis_padding = 16
margin_edge = 8
margin_ends = 0
monitors = []
pinned = []
position = "bottom"
radius = 16
radius_bottom_left = 16
radius_bottom_right = 16
radius_top_left = 16
radius_top_right = 16
reserve_space = true
shadow = true
show_dots = false
show_instance_count = true
show_running = true

[hooks]
battery_charging = []
battery_discharging = []
battery_percentage_changed = []
battery_plugged = []
bluetooth_disabled = []
bluetooth_enabled = []
colors_changed = []
logging_out = []
power_profile_changed = []
rebooting = []
session_locked = []
session_unlocked = []
shutting_down = []
started = []
theme_mode_changed = []
wallpaper_changed = [ "noctalia msg color-scheme-set wallpaper m3-content && noctalia msg templates-apply" ]
wifi_disabled = []
wifi_enabled = []

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]
pre_action_fade_seconds = 2.0

    [idle.behavior.lock]
    action = "lock"
    command = ""
    enabled = false
    resume_command = ""
    timeout = 600

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    command = ""
    enabled = false
    resume_command = ""
    timeout = 900

    [idle.behavior.screen-off]
    action = "screen_off"
    command = ""
    enabled = false
    resume_command = ""
    timeout = 660

[keybinds]
cancel = [ "Escape" ]
down = [ "Down" ]
left = [ "Left" ]
right = [ "Right" ]
up = [ "Up" ]
validate = [ "Return", "KP_Enter" ]

[location]
address = "tangshan"
auto_locate = false
sunrise = ""
sunset = ""

[lockscreen]
allow_empty_password = false
blur_intensity = 0.5
blurred_desktop = false
enabled = true
fingerprint = true
monitors = []
tint_intensity = 0.30000001192092896
wallpaper = ""

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 1024.0
    cy = 1029.0
    enabled = true
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[nightlight]
enabled = false
force = false
temperature_day = 6500
temperature_night = 4000

[notification]
background_opacity = 0.97000002861022949
collapse_on_dismiss = true
enable_daemon = true
layer = "top"
monitors = []
offset_x = 20
offset_y = 8
position = "top_right"
scale = 1.0
show_actions = true
show_app_name = true

[osd]
background_opacity = 0.97000002861022949
monitors = []
offset_x = 20
offset_y = 8
orientation = "horizontal"
position = "top_center"
scale = 1.0

    [osd.kinds]
    bluetooth = true
    brightness = true
    caffeine = true
    dnd = true
    keyboard_layout = true
    lock_keys = true
    media = true
    power_profile = true
    volume = true
    volume_input = true
    volume_output = true
    wifi = true

[plugins]
enabled = [ "noctalia/screen_recorder", "noctalia/bongocat" ]

    [[plugins.source]]
    auto_update = false
    enabled = true
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

    [[plugins.source]]
    auto_update = false
    enabled = true
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

[shell]
app_icon_colorize = false
avatar_path = "/var/lib/AccountsService/icons/yukong"
clipboard_auto_paste = "auto"
clipboard_confirm_clear_history = true
clipboard_enabled = true
clipboard_history_max_entries = 100
clipboard_image_action_command = ""
corner_radius_scale = 1.0
