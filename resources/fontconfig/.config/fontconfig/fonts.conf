<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">

<fontconfig>

  <!-- Sans -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>MiSans</family>
      <family>Noto Sans CJK SC</family>
    </prefer>
  </alias>

  <match target="pattern">
    <test qual="any" name="family">
      <string>sans-serif</string>
    </test>
    <test name="lang" compare="contains">
      <string>zh-tw</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>LXGW WenKai Screen</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>sans-serif</string>
    </test>
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>SimSun</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>LXGW WenKai Screen</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>宋体</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>LXGW WenKai Screen</string>
    </edit>
  </match>

  <!-- Serif -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>LXGW ZhenKai GB</family>
      <family>LXGW WenKai Screen</family>
      <family>Noto Serif CJK SC</family>
    </prefer>
  </alias>

  <match target="pattern">
    <test qual="any" name="family">
      <string>serif</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>LXGW ZhenKai GB</string>
    </edit>
  </match>

  <!-- Monospace -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Maple Mono Normal NF CN</family>
      <family>ComicShannsMono Nerd Font</family>
      <family>Sarasa Mono SC</family>
    </prefer>
  </alias>

  <match target="pattern">
    <test qual="any" name="family">
      <string>monospace</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Maple Mono Normal NF CN</string>
    </edit>
  </match>


  <!-- Anti-alias -->
  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
  </match>

  <!-- Hinting -->
  <match target="font">
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
  </match>

  <!-- Hint Style -->
  <match target="font">
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
  </match>

  <!-- Subpixel -->
  <match target="font">
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
  </match>

  <!-- LCD Filter -->
  <match target="font">
    <edit name="lcdfilter" mode="assign">
      <const>lcddefault</const>
    </edit>
  </match>

  <!-- Disable bitmap fonts -->
  <match target="font">
    <edit name="embeddedbitmap" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

<!-- Enable bitmap for emoji -->
<match target="font">
  <test name="family">
    <string>Noto Color Emoji</string>
  </test>

  <edit name="embeddedbitmap" mode="assign">
    <bool>true</bool>
  </edit>
</match>

</fontconfig> 
